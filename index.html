<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vera Bot API Dashboard v1.2.0</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f0f23;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
      }
      /* Starry background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          radial-gradient(2px 2px at 20px 30px, #eee, transparent),
          radial-gradient(2px 2px at 40px 70px, #fff, transparent),
          radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
          radial-gradient(2px 2px at 90px 40px, #fff, transparent),
          radial-gradient(2px 2px at 130px 80px, #fff, transparent),
          radial-gradient(2px 2px at 160px 120px, #ddd, transparent),
          radial-gradient(1px 1px at 200px 30px, #fff, transparent),
          radial-gradient(1px 1px at 250px 90px, #ddd, transparent),
          radial-gradient(1px 1px at 300px 50px, #fff, transparent),
          radial-gradient(1px 1px at 350px 130px, #ddd, transparent),
          radial-gradient(1px 1px at 400px 70px, #fff, transparent);
        background-repeat: repeat;
        background-size: 500px 500px;
        animation: stars 120s linear infinite;
        z-index: -1;
      }
      @keyframes stars {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-500px);
        }
      }
      a {
        color: #8b5cf6;
        text-decoration: none;
        font-size: 14px;
      }
      a:hover {
        color: #a78bfa;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }
      .header {
        background: rgba(15, 15, 35, 0.9);
        border: 1px solid #2d2d5a;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
      }
      .header h1 {
        color: #8b5cf6;
        margin-bottom: 10px;
        font-size: 28px;
        text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
      }
      .header .status {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 8px currentColor;
      }
      .status-dot.online {
        background: #10b981;
        color: #10b981;
      }
      .status-dot.offline {
        background: #ef4444;
        color: #ef4444;
      }
      .card {
        background: rgba(15, 15, 35, 0.9);
        border: 1px solid #2d2d5a;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
      }
      .card h2 {
        color: #a78bfa;
        margin-bottom: 15px;
        border-bottom: 2px solid #2d2d5a;
        padding-bottom: 10px;
        font-size: 18px;
      }
      .endpoint {
        font-family: "Courier New", monospace;
        color: #8b5cf6;
        font-weight: bold;
      }
      .method-get {
        color: #10b981;
      }
      .method-post {
        color: #f59e0b;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #2d2d5a;
        border-radius: 5px;
        font-size: 14px;
        background: rgba(15, 15, 35, 0.8);
        color: #e0e0e0;
        font-family: "Courier New", monospace;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 8px rgba(139, 92, 246, 0.3);
      }
      button {
        width: 100%;
        padding: 12px;
        margin: 5px 0;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      .response {
        background: #0a0a1a;
        color: #a78bfa;
        padding: 15px;
        border-radius: 5px;
        margin-top: 10px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        border: 1px solid #2d2d5a;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .two-col {
          grid-template-columns: 1fr;
        }
        .header h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🤖 Vera Bot API Dashboard</h1>
        <a href="https://vera-bot-npn1.onrender.com">Live Bot URL</a>
        <div class="status">
          <div>
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Checking...</span>
          </div>
          <div>Uptime: <span id="uptime">--</span>s</div>
          <div>Contexts: <span id="contexts">--</span></div>
        </div>
      </div>

      <div class="grid">
        <!-- Health Check -->
        <div class="card">
          <h2>
            <span class="endpoint"
              ><span class="method-get">GET</span> /v1/healthz</span
            >
          </h2>
          <button onclick="testHealthz()">Test Now</button>
          <div class="response" id="healthzResponse"></div>
        </div>

        <!-- Metadata -->
        <div class="card">
          <h2>
            <span class="endpoint"
              ><span class="method-get">GET</span> /v1/metadata</span
            >
          </h2>
          <button onclick="testMetadata()">Test Now</button>
          <div class="response" id="metadataResponse"></div>
        </div>

        <!-- Context Push -->
        <div class="card">
          <h2>
            <span class="endpoint"
              ><span class="method-post">POST</span> /v1/context</span
            >
          </h2>
          <select id="ctxScope">
            <option value="merchant">merchant</option>
            <option value="category">category</option>
            <option value="trigger">trigger</option>
            <option value="customer">customer</option>
          </select>
          <input
            type="text"
            id="ctxId"
            placeholder="Context ID (e.g., merchant_001)"
          />
          <input
            type="number"
            id="ctxVersion"
            placeholder="Version"
            value="1"
          />
          <textarea
            id="ctxPayload"
            rows="4"
            placeholder='Payload (JSON): {"name": "Test"}'
          >
{"name": "Test", "category_slug": "dentists"}</textarea
          >
          <button onclick="testContext()">Send Request</button>
          <div class="response" id="contextResponse"></div>
        </div>

        <!-- Tick -->
        <div class="card">
          <h2>
            <span class="endpoint"
              ><span class="method-post">POST</span> /v1/tick</span
            >
          </h2>
          <input
            type="text"
            id="tickNow"
            value="2026-05-03T14:00:00Z"
            placeholder="Now (ISO timestamp)"
          />
          <textarea
            id="tickTriggers"
            rows="3"
            placeholder="Available Triggers (JSON array)"
          >
["trigger_001"]</textarea
          >
          <button onclick="testTick()">Send Request</button>
          <div class="response" id="tickResponse"></div>
        </div>

        <!-- Reply -->
        <div class="card">
          <h2>
            <span class="endpoint"
              ><span class="method-post">POST</span> /v1/reply</span
            >
          </h2>
          <div class="two-col">
            <input
              type="text"
              id="replyConvId"
              placeholder="Conversation ID"
              value="conv_001"
            />
            <input
              type="text"
              id="replyMerchantId"
              placeholder="Merchant ID"
              value="merchant_001"
            />
          </div>
          <input
            type="text"
            id="replyMessage"
            placeholder="Message"
            value="What about DCI compliance?"
          />
          <div class="two-col">
            <input
              type="number"
              id="replyTurn"
              placeholder="Turn Number"
              value="1"
            />
            <select id="replyRole">
              <option value="merchant">merchant</option>
              <option value="customer">customer</option>
            </select>
          </div>
          <button onclick="testReply()">Send Request</button>
          <div class="response" id="replyResponse"></div>
        </div>
      </div>
    </div>

    <script>
      // Use deployed live bot URL - frontend served locally, backend is live
      const BASE_URL = "https://vera-bot-npn1.onrender.com";

      async function apiCall(endpoint, method = "GET", body = null) {
        const url = `${BASE_URL}${endpoint}`;
        const options = { method, headers: {} };
        if (body) {
          options.headers["Content-Type"] = "application/json";
          options.body = JSON.stringify(body);
        }
        const response = await fetch(url, options);
        const data = await response.json();
        return { status: response.status, data };
      }

      function displayResponse(elementId, { status, data }) {
        const el = document.getElementById(elementId);
        el.textContent = `HTTP ${status}\n\n${JSON.stringify(data, null, 2)}`;
      }

      async function testHealthz() {
        const result = await apiCall("/v1/healthz");
        displayResponse("healthzResponse", result);
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        if (result.status === 200) {
          dot.className = "status-dot online";
          text.textContent = "Online";
          document.getElementById("uptime").textContent =
            result.data.uptime_seconds;
          document.getElementById("contexts").textContent = JSON.stringify(
            result.data.contexts_loaded,
          );
        } else {
          dot.className = "status-dot offline";
          text.textContent = "Offline";
        }
      }

      async function testMetadata() {
        const result = await apiCall("/v1/metadata");
        displayResponse("metadataResponse", result);
      }

      async function testContext() {
        const scope = document.getElementById("ctxScope").value;
        const context_id = document.getElementById("ctxId").value;
        const version = parseInt(document.getElementById("ctxVersion").value);
        const payload = JSON.parse(document.getElementById("ctxPayload").value);
        const body = {
          scope,
          context_id,
          version,
          payload,
          delivered_at: new Date().toISOString(),
        };
        const result = await apiCall("/v1/context", "POST", body);
        displayResponse("contextResponse", result);
      }

      async function testTick() {
        const now = document.getElementById("tickNow").value;
        const triggers = JSON.parse(
          document.getElementById("tickTriggers").value,
        );
        const body = { now, available_triggers: triggers };
        const result = await apiCall("/v1/tick", "POST", body);
        displayResponse("tickResponse", result);
      }

      async function testReply() {
        const conversation_id = document.getElementById("replyConvId").value;
        const merchant_id = document.getElementById("replyMerchantId").value;
        const message = document.getElementById("replyMessage").value;
        const turn_number = parseInt(
          document.getElementById("replyTurn").value,
        );
        const from_role = document.getElementById("replyRole").value;
        const body = {
          conversation_id,
          merchant_id,
          message,
          turn_number,
          from_role,
          received_at: new Date().toISOString(),
        };
        const result = await apiCall("/v1/reply", "POST", body);
        displayResponse("replyResponse", result);
      }

      // Auto-test health on load
      window.onload = function () {
        testHealthz();
      };
    </script>
  </body>
</html>
